name: Task
description: A concrete piece of work (refactor, chore, docs, setup)
labels: ["task"]
body:
  - type: textarea
    id: what
    attributes:
      label: What needs to be done?
    validations:
      required: true
  - type: textarea
    id: done
    attributes:
      label: Definition of done
      placeholder: How do we know this is finished?
    validations:
      required: false
